<!-- Floating trigger tab -->
<div class="dice-trigger" (click)="togglePanel()" [class.dice-trigger--open]="isOpen()">
  <span class="dice-trigger__icon">🎲</span>
  <span class="dice-trigger__label">Kostky</span>
</div>

<!-- Side panel -->
<div class="dice-panel" [class.dice-panel--open]="isOpen()">

  <div class="dice-panel__header">
    <span class="dice-panel__title">🎲 Hod kostkami</span>
    <button class="dice-panel__close" (click)="togglePanel()">✕</button>
  </div>

  <!-- Dice buttons -->
  <div class="dice-panel__selector">
    @for (dice of diceTypes; track dice) {
      <button
        class="dice-btn"
        [class.dice-btn--active]="countInQueue(dice) > 0"
        [class.dice-btn--k20]="dice === 'k20'"
        (click)="addDie(dice)"
        [title]="'Přidat ' + dice"
      >
        {{ dice }}
        @if (countInQueue(dice) > 0) {
          <span class="dice-btn__badge">{{ countInQueue(dice) }}</span>
        }
      </button>
    }
  </div>

  <!-- Queue -->
  @if (queue().length > 0) {
    <div class="dice-panel__queue">
      <div class="queue-chips">
        @for (d of queue(); track d.id) {
          <span class="queue-chip" (click)="removeDieFromQueue(d.id)">
            {{ d.type }}<span class="queue-chip__x"> ×</span>
          </span>
        }
      </div>
    </div>
  }

  <!-- Actions -->
  <div class="dice-panel__actions">
    <button
      class="dice-action-btn dice-action-btn--roll"
      [disabled]="queue().length === 0 || isRolling()"
      (click)="rollAll()"
    >
      @if (isRolling()) { ⏳ Hází se... } @else { 🎲 Hodit ({{ queue().length }}) }
    </button>
    <button class="dice-action-btn dice-action-btn--clear" (click)="clearAll()">✕</button>
  </div>

  <!-- Results -->
  @if (results().length > 0) {
    <div class="dice-panel__results">
      <div class="results-grid">
        @for (r of results(); track r.id) {
          <div
            class="dice-result"
            [class.dice-result--nat20]="isNat20(r)"
            [class.dice-result--crit-fail]="isCritFail(r)"
            (click)="removeResult(r.id)"
            title="Klikni pro odebrání"
          >
            <span class="dice-result__type">{{ r.dice }}</span>
            <span class="dice-result__value">{{ r.value }}</span>
          </div>
        }
        @if (totalSum() !== null) {
          <div class="dice-result dice-result--total">
            <span class="dice-result__type">Σ</span>
            <span class="dice-result__value">{{ totalSum() }}</span>
          </div>
        }
      </div>
    </div>
  }

</div>
